name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  links:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links in documentation
        uses: lycheeverse/lychee-action@v2
        with:
          # Release-asset "latest download" URLs (e.g. the .mcpb button in README)
          # 404 transiently on a release: this link check runs concurrently with the
          # release workflow, which uploads the asset ~1 min after creating the
          # release. Exclude them — the build-extension job validates the asset.
          args: >-
            --verbose
            --no-progress
            --accept 200,204,301,302,403,429
            --exclude 'localhost'
            --exclude '127.0.0.1'
            --exclude 'x.com/i/communities'
            --exclude 'github.com/.*/compare/.*\.\.\..*'
            --exclude 'github.com/.*/releases/latest/download/.*'
            README.md
            INSTALLATION.md
            CHANGELOG.md
          fail: true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Test coverage
        run: npm run test:coverage
        continue-on-error: true

      # Headless installer e2e matrix (builds+packs a tarball, runs install/uninstall
      # scenarios against an in-process mock — no docker, no node-pty, no network).
      # Gates the risky write/abort/idempotency paths the unit tests don't reach.
      # Check out the production curl|sh entrypoint (served at automem.ai/install.sh)
      # immediately before the e2e step — NOT at the top — so this external checkout
      # never contaminates lint/build/test scope (`eslint .` / `vitest run` would
      # otherwise traverse automem-website/ and fail on its source).
      - name: Check out automem-website (for the curl|sh install bootstrap)
        uses: actions/checkout@v4
        with:
          repository: verygoodplugins/automem-website
          path: automem-website

      - name: E2E install scenarios
        env:
          # Point the harness at the real production install.sh and REQUIRE it, so the
          # website-bootstrap (curl | sh) scenario can never be silently skipped again.
          # A missing/renamed checkout now fails the build instead of going green-untested.
          AUTOMEM_INSTALL_SH: ${{ github.workspace }}/automem-website/public/install.sh
          AUTOMEM_REQUIRE_INSTALL_SH: "1"
        run: npm run test:e2e

  hooks-windows:
    name: Hook commands (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Regression guard for #108: hook commands shipped in templates/plugins
      # must execute via Node child_process (cmd.exe /d /s /c on Windows), the
      # same model Claude Code uses to launch hooks. On Windows there is no
      # parent shell to parse `VAR=value command` prefixes, so the wrapped
      # `bash -c '…'` form is the only one that works. This test fails loudly
      # if the wrap regresses.
      - name: Verify wrapped hook commands run on Windows
        run: npx vitest run tests/installer/hook-commands.test.ts
